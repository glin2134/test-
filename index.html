<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎯 Угадай число</title>
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        }

        body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        transition: background 0.5s;
        }

        body.dark {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark .container {
        background: rgba(30, 30, 50, 0.95);
        color: #fff;
        }

        body.dark .stats,
        body.dark .result,
        body.dark .hint-box {
        background: rgba(255, 255, 255, 0.08);
        color: #ddd;
        }

        body.dark .stat-value {
        color: #fff;
        }

        body.dark input {
        background: #2a2a3a;
        border-color: #444;
        color: #fff;
        }

        body.dark .subtitle {
        color: #aaa;
        }

        body.dark h1 {
        color: #fff;
        }

        .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 30px;
        padding: 30px 25px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        transition: background 0.5s;
        }

        h1 {
        text-align: center;
        font-size: 28px;
        color: #2c3e50;
        margin-bottom: 5px;
        }

        .subtitle {
        text-align: center;
        color: #7f8c8d;
        font-size: 14px;
        margin-bottom: 20px;
        }

        .stats {
        display: flex;
        justify-content: space-between;
        background: #f8f9fa;
        padding: 12px 15px;
        border-radius: 15px;
        margin-bottom: 20px;
        transition: background 0.5s;
        }

        .stat-item {
        text-align: center;
        font-size: 13px;
        color: #7f8c8d;
        }

        .stat-value {
        font-size: 20px;
        font-weight: bold;
        color: #2c3e50;
        }

        .stat-value.green {
        color: #27ae60;
        }
        .stat-value.gold {
        color: #f39c12;
        }
        .stat-value.blue {
        color: #3498db;
        }
        .stat-value.purple {
        color: #8e44ad;
        }

        .input-area {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
        }

        input {
        flex: 1;
        padding: 15px;
        font-size: 24px;
        text-align: center;
        border: 3px solid #e0e0e0;
        border-radius: 15px;
        outline: none;
        transition: border-color 0.3s, background 0.3s;
        background: #fafafa;
        }

        input:focus {
        border-color: #667eea;
        }

        input:disabled {
        opacity: 0.5;
        }

        .btn {
        padding: 15px 25px;
        font-size: 18px;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.2s;
        font-weight: bold;
        touch-action: manipulation;
        }

        .btn:active {
        transform: scale(0.95);
        }

        .btn-success {
        background: #27ae60;
        color: white;
        flex: 0 0 auto;
        }
        .btn-danger {
        background: #e74c3c;
        color: white;
        flex: 0 0 auto;
        }
        .btn-hint {
        background: #f39c12;
        color: white;
        flex: 0 0 auto;
        }
        .btn-theme {
        background: #34495e;
        color: white;
        flex: 0 0 auto;
        }
        .btn-new {
        background: #3498db;
        color: white;
        width: 100%;
        margin-top: 10px;
        }
        .btn-difficulty {
        background: #8e44ad;
        color: white;
        flex: 1;
        font-size: 14px;
        padding: 10px;
        }
        .btn-difficulty.active {
        background: #6c3483;
        box-shadow: 0 0 10px rgba(142, 68, 173, 0.5);
        }

        .result {
        text-align: center;
        font-size: 18px;
        padding: 15px;
        border-radius: 15px;
        margin-top: 15px;
        min-height: 60px;
        background: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.5s;
        }

        .result.orange {
        color: #e67e22;
        }
        .result.green {
        color: #27ae60;
        }
        .result.red {
        color: #e74c3c;
        }
        .result.blue {
        color: #3498db;
        }
        .result.purple {
        color: #8e44ad;
        }

        .hint-box {
        text-align: center;
        font-size: 15px;
        padding: 10px;
        margin-top: 10px;
        min-height: 40px;
        color: #8e44ad;
        background: #f3e5f5;
        border-radius: 10px;
        transition: background 0.5s;
        }

        .btn-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
        }

        .btn-row .btn {
        flex: 1;
        font-size: 16px;
        padding: 12px;
        min-width: 60px;
        }

        .achievement {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(39, 174, 96, 0.95);
        color: white;
        padding: 15px 30px;
        border-radius: 15px;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        animation: slideDown 0.5s ease-out;
        z-index: 1000;
        display: none;
        }

        @keyframes slideDown {
        from {
        transform: translateX(-50%) translateY(-100px);
        opacity: 0;
        }
        to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
        }
        }

        .achievement.show {
        display: block;
        }

        @media (max-width: 400px) {
        .container {
        padding: 20px 15px;
        }
        h1 {
        font-size: 24px;
        }
        input {
        font-size: 20px;
        padding: 12px;
        }
        .btn {
        font-size: 14px;
        padding: 10px 14px;
        }
        .btn-difficulty {
        font-size: 12px;
        padding: 8px;
        }
        }
    </style>
</head>
<body>

<div class="achievement" id="achievement">🏆 Достижение!</div>

<div class="container">
    <h1>🎯 Угадай число</h1>
    <div class="subtitle" id="subtitle">От 1 до 100</div>

    <div class="stats">
        <div class="stat-item">🏆 Очки<br><span class="stat-value green" id="scoreDisplay">0</span></div>
        <div class="stat-item">👑 Рекорд<br><span class="stat-value gold" id="bestDisplay">0</span></div>
        <div class="stat-item">📊 Попытки<br><span class="stat-value blue" id="attemptsDisplay">0/10</span></div>
        <div class="stat-item">⏱️ Сек<br><span class="stat-value purple" id="timerDisplay">0</span></div>
    </div>

    <div class="input-area">
        <input type="number" id="guessInput" placeholder="Число" min="1" max="100" inputmode="numeric">
        <button class="btn btn-success" id="checkBtn">✅</button>
    </div>

    <div class="result blue" id="resultDisplay">Введи число и нажми ✅</div>
    <div class="hint-box" id="hintDisplay">💡 Нажми "Подсказка"</div>

    <div class="btn-row">
        <button class="btn btn-hint" id="hintBtn">💡</button>
        <button class="btn btn-theme" id="themeBtn">🌙</button>
        <button class="btn btn-danger" id="newBtn">🔄 Новая</button>
    </div>

    <div class="btn-row" style="margin-top: 10px;">
        <button class="btn btn-difficulty active" data-level="easy">🟢 Лёгкий</button>
        <button class="btn btn-difficulty" data-level="medium">🟡 Средний</button>
        <button class="btn btn-difficulty" data-level="hard">🔴 Сложный</button>
    </div>
</div>

<!-- VK BRIDGE -->
<script src="https://vk.com/js/api/xd_connection.js?2"></script>
<script src="https://vk.com/js/api/openapi.js?169"></script>

<script>
    // ============================================================
    // 1. VK MINI APP INIT
    // ============================================================
    VK.init(function() {
    VK.callMethod("resizeWindow", window.innerWidth, window.innerHeight);
    if (typeof VKWebAppInit !== 'undefined') {
    VKWebAppInit();
    }
    console.log("✅ VK Mini App инициализировано");
    }, function(error) {
    console.error("❌ Ошибка VK:", error);
    });

    // ============================================================
    // 2. ИГРА — ВСЯ ЛОГИКА
    // ============================================================
    let secret = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;
    const maxAttempts = 10;
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
    let timer = 0;
    let timerInterval = null;
    let isGameActive = false;
    let level = 'easy';
    let achievements = {
    firstTry: false,
    master: false,
    pro: false
    };

    const levels = {
    easy: { max: 50, attempts: 10, label: 'От 1 до 50', bonus: 1 },
    medium: { max: 100, attempts: 10, label: 'От 1 до 100', bonus: 2 },
    hard: { max: 200, attempts: 8, label: 'От 1 до 200', bonus: 3 }
    };

    // DOM
    const input = document.getElementById('guessInput');
    const checkBtn = document.getElementById('checkBtn');
    const newBtn = document.getElementById('newBtn');
    const hintBtn = document.getElementById('hintBtn');
    const themeBtn = document.getElementById('themeBtn');
    const resultDisplay = document.getElementById('resultDisplay');
    const hintDisplay = document.getElementById('hintDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const bestDisplay = document.getElementById('bestDisplay');
    const attemptsDisplay = document.getElementById('attemptsDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const achievementDiv = document.getElementById('achievement');
    const diffBtns = document.querySelectorAll('.btn-difficulty');

    function updateUI() {
    scoreDisplay.textContent = score;
    bestDisplay.textContent = bestScore;
    attemptsDisplay.textContent = `${attempts}/${levels[level].attempts}`;
    }

    function showAchievement(text) {
    achievementDiv.textContent = text;
    achievementDiv.classList.add('show');
    setTimeout(() => {
    achievementDiv.classList.remove('show');
    }, 2500);
    }

    function startTimer() {
    if (timerInterval) return;
    timer = 0;
    timerDisplay.textContent = '0';
    isGameActive = true;
    timerInterval = setInterval(() => {
    timer++;
    timerDisplay.textContent = timer;
    }, 1000);
    }

    function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    isGameActive = false;
    }

    function checkAchievements() {
    if (attempts === 1 && !achievements.firstTry) {
    achievements.firstTry = true;
    showAchievement('🎯 С первого раза! Ты гений!');
    }
    if (attempts <= 3 && !achievements.master) {
    achievements.master = true;
    showAchievement('🏆 Мастер! Отличная интуиция!');
    }
    if (attempts <= 5 && !achievements.pro) {
    achievements.pro = true;
    showAchievement('🌟 Профи! Ты на высоте!');
    }
    }

    function checkGuess() {
    const raw = input.value.trim();
    if (raw === '') {
    resultDisplay.textContent = '⚠️ Введи число!';
    resultDisplay.className = 'result red';
    return;
    }
    const guess = parseInt(raw);
    const maxNum = levels[level].max;
    if (isNaN(guess) || guess < 1 || guess > maxNum) {
    resultDisplay.textContent = `⚠️ Число от 1 до ${maxNum}!`;
    resultDisplay.className = 'result red';
    return;
    }

    if (!isGameActive) startTimer();
    attempts++;
    const remaining = levels[level].attempts - attempts;

    if (guess < secret) {
    resultDisplay.textContent = `❌ Мало! Осталось ${remaining} попыток`;
    resultDisplay.className = 'result orange';
    } else if (guess > secret) {
    resultDisplay.textContent = `❌ Много! Осталось ${remaining} попыток`;
    resultDisplay.className = 'result orange';
    } else {
    stopTimer();
    const bonus = levels[level].bonus;
    const points = (levels[level].attempts - attempts + 1) * bonus + Math.max(0, 10 - timer);
    const totalPoints = Math.max(points, 1);
    score += totalPoints;
    if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('bestScore', bestScore);
    }
    resultDisplay.textContent = `🎉 Угадал за ${attempts} попыток! +${totalPoints} очков 🕐${timer}с`;
    resultDisplay.className = 'result green';
    input.disabled = true;
    checkBtn.disabled = true;
    checkAchievements();
    updateUI();
    return;
    }

    if (attempts >= levels[level].attempts) {
    stopTimer();
    resultDisplay.textContent = `💔 Проиграл! Было ${secret}`;
    resultDisplay.className = 'result red';
    input.disabled = true;
    checkBtn.disabled = true;
    }

    updateUI();
    input.value = '';
    input.focus();
    }

    function newGame() {
    stopTimer();
    const maxNum = levels[level].max;
    secret = Math.floor(Math.random() * maxNum) + 1;
    attempts = 0;
    timer = 0;
    timerDisplay.textContent = '0';
    isGameActive = false;
    input.disabled = false;
    checkBtn.disabled = false;
    input.value = '';
    resultDisplay.textContent = `🔄 Новая игра! (1-${maxNum})`;
    resultDisplay.className = 'result blue';
    hintDisplay.textContent = '💡 Нажми "Подсказка"';
    achievements = { firstTry: false, master: false, pro: false };
    updateUI();
    input.focus();
    }

    function showHint() {
    const maxNum = levels[level].max;
    const mid = Math.floor(maxNum / 2);
    if (secret < mid) {
    hintDisplay.textContent = `💡 Число МЕНЬШЕ ${mid}`;
    } else {
    hintDisplay.textContent = `💡 Число БОЛЬШЕ ${mid}`;
    }
    }

    function toggleTheme() {
    document.body.classList.toggle('dark');
    themeBtn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    }

    function setLevel(lvl) {
    level = lvl;
    diffBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.level === lvl);
    });
    document.getElementById('subtitle').textContent = levels[lvl].label;
    const maxNum = levels[lvl].max;
    secret = Math.floor(Math.random() * maxNum) + 1;
    attempts = 0;
    timer = 0;
    timerDisplay.textContent = '0';
    isGameActive = false;
    input.disabled = false;
    checkBtn.disabled = false;
    input.value = '';
    resultDisplay.textContent = `🎮 Новый уровень! (1-${maxNum})`;
    resultDisplay.className = 'result blue';
    hintDisplay.textContent = '💡 Нажми "Подсказка"';
    updateUI();
    input.focus();
    }

    // События
    checkBtn.addEventListener('click', checkGuess);
    newBtn.addEventListener('click', newGame);
    hintBtn.addEventListener('click', showHint);
    themeBtn.addEventListener('click', toggleTheme);
    input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkGuess();
    });
    diffBtns.forEach(btn => {
    btn.addEventListener('click', () => {
    setLevel(btn.dataset.level);
    });
    });

    // Старт
    updateUI();
    input.focus();
</script>
</body>
</html>
