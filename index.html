<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎯 Угадай число</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 16px;
}
.container {
background: white;
border-radius: 24px;
padding: 24px 20px;
max-width: 400px;
width: 100%;
box-shadow: 0 12px 40px rgba(0,0,0,0.25);
}
h1 { text-align: center; font-size: 26px; margin-bottom: 4px; }
.subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 18px; }
.stats {
display: flex;
justify-content: space-between;
background: #f2f2f2;
padding: 10px 12px;
border-radius: 14px;
margin-bottom: 18px;
font-size: 13px;
text-align: center;
}
.stat-value { font-size: 20px; font-weight: bold; }
.green { color: #27ae60; }
.gold { color: #f39c12; }
.blue { color: #2980b9; }
.purple { color: #8e44ad; }
.input-area {
display: flex;
gap: 10px;
margin-bottom: 14px;
}
input {
flex: 1;
padding: 14px;
font-size: 22px;
text-align: center;
border: 2px solid #ddd;
border-radius: 14px;
outline: none;
}
input:focus { border-color: #667eea; }
.btn {
padding: 14px 18px;
font-size: 18px;
border: none;
border-radius: 14px;
font-weight: bold;
cursor: pointer;
transition: 0.15s;
touch-action: manipulation;
}
.btn:active { transform: scale(0.94); }
.btn-success { background: #27ae60; color: white; }
.btn-danger { background: #e74c3c; color: white; }
.btn-hint { background: #f39c12; color: white; }
.btn-theme { background: #34495e; color: white; }
.btn-difficulty { background: #8e44ad; color: white; flex: 1; font-size: 13px; padding: 10px; }
.btn-difficulty.active { background: #6c3483; box-shadow: 0 0 8px #8e44ad88; }
.btn-leaderboard { background: #e67e22; color: white; flex: 1; font-size: 13px; padding: 10px; }
.result {
background: #f2f2f2;
padding: 14px;
border-radius: 14px;
margin-top: 14px;
text-align: center;
min-height: 56px;
font-size: 17px;
display: flex;
align-items: center;
justify-content: center;
}
.result.orange { color: #e67e22; }
.result.green { color: #27ae60; }
.result.red { color: #e74c3c; }
.result.blue { color: #2980b9; }
.hint-box {
background: #f3e5f5;
padding: 10px;
border-radius: 12px;
margin-top: 10px;
text-align: center;
color: #6c3483;
}
.btn-row {
display: flex;
gap: 8px;
margin-top: 10px;
flex-wrap: wrap;
}
.btn-row .btn { flex: 1; font-size: 15px; padding: 12px; min-width: 52px; }
.leaderboard {
background: #f2f2f2;
border-radius: 14px;
padding: 14px;
margin-top: 18px;
display: none;
}
.leaderboard.show { display: block; }
.leaderboard h3 { text-align: center; margin-bottom: 8px; }
.leaderboard-item {
display: flex;
justify-content: space-between;
padding: 6px 10px;
border-bottom: 1px solid #ddd;
font-size: 15px;
}
.leaderboard-item:last-child { border-bottom: none; }
.name-input-overlay {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.5);
display: none;
justify-content: center;
align-items: center;
z-index: 999;
}
.name-input-overlay.show { display: flex; }
.name-input-box {
background: white;
padding: 28px 24px;
border-radius: 20px;
max-width: 300px;
width: 90%;
text-align: center;
}
.name-input-box input {
width: 100%;
padding: 12px;
font-size: 18px;
border-radius: 10px;
border: 2px solid #ddd;
margin-bottom: 12px;
}
.name-input-box .btn { width: 100%; }
.achievement {
position: fixed;
top: 20px;
left: 50%;
transform: translateX(-50%);
background: #27ae60;
color: white;
padding: 14px 28px;
border-radius: 14px;
font-weight: bold;
box-shadow: 0 8px 24px rgba(0,0,0,0.3);
z-index: 1000;
display: none;
}
.achievement.show { display: block; }
@media (max-width: 400px) {
.container { padding: 16px 12px; }
h1 { font-size: 22px; }
input { font-size: 18px; padding: 10px; }
.btn { font-size: 14px; padding: 10px; }
}
</style>
</head>
<body>

<div class="achievement" id="achievement">🏆 Достижение!</div>

<div class="name-input-overlay" id="nameOverlay">
<div class="name-input-box">
<h3>🏆 Новый рекорд!</h3>
<p style="font-size:14px; opacity:0.7; margin-bottom:12px;">Введи своё имя</p>
<input type="text" id="nameInput" placeholder="Твоё имя" maxlength="15">
<button class="btn btn-success" id="saveNameBtn">Сохранить</button>
</div>
</div>

<div class="container">
<h1>🎯 Угадай число</h1>
<div class="subtitle" id="subtitle">От 1 до 100</div>

<div class="stats">
<div class="stat-item">🏆 Очки<br><span class="stat-value green" id="scoreDisplay">0</span></div>
<div class="stat-item">👑 Рекорд<br><span class="stat-value gold" id="bestDisplay">0</span></div>
<div class="stat-item">📊 Попытки<br><span class="stat-value blue" id="attemptsDisplay">0/10</span></div>
<div class="stat-item">⏱️ Сек<br><span class="stat-value purple" id="timerDisplay">0</span></div>
</div>

<div class="input-area">
<input type="number" id="guessInput" placeholder="Число" min="1" max="100">
<button class="btn btn-success" id="checkBtn">✅</button>
</div>

<div class="result blue" id="resultDisplay">Введи число и нажми ✅</div>
<div class="hint-box" id="hintDisplay">💡 Нажми "Подсказка"</div>

<div class="btn-row">
<button class="btn btn-hint" id="hintBtn">💡</button>
<button class="btn btn-theme" id="themeBtn">🌙</button>
<button class="btn btn-danger" id="newBtn">🔄 Новая</button>
</div>

<div class="btn-row" style="margin-top:8px;">
<button class="btn btn-difficulty active" data-level="easy">🟢 Лёгкий</button>
<button class="btn btn-difficulty" data-level="medium">🟡 Средний</button>
<button class="btn btn-difficulty" data-level="hard">🔴 Сложный</button>
</div>

<div class="btn-row" style="margin-top:4px;">
<button class="btn btn-leaderboard" id="leaderboardBtn">🏆 Таблица лидеров</button>
</div>

<div class="leaderboard" id="leaderboard">
<h3>🏆 Топ-10</h3>
<div id="leaderboardList"></div>
</div>
</div>

<!-- VK BRIDGE — гарантированная инициализация -->
<script src="https://vk.com/js/api/xd_connection.js?2"></script>
<script>
// Простая и надёжная инициализация VK Mini App
function initVK() {
try {
if (typeof VK !== 'undefined' && VK.init) {
VK.init(function() {
// Сигнал о полной загрузке
if (typeof VKWebAppInit !== 'undefined') {
VKWebAppInit();
}
// Подгоняем размер под контент
if (VK.callMethod) {
VK.callMethod("resizeWindow", window.innerWidth, window.innerHeight);
}
console.log('✅ VK Mini App инициализирован');
}, function(error) {
console.warn('⚠️ VK инициализация с ошибкой, но приложение работает:', error);
// Даже если ошибка — даём сигнал вручную
if (typeof VKWebAppInit !== 'undefined') {
VKWebAppInit();
}
});
} else {
console.warn('⚠️ VK Bridge не загружен, пробуем альтернативный способ');
// Альтернативный сигнал для VK
if (typeof window.VKWebAppInit === 'function') {
window.VKWebAppInit();
}
}
} catch (e) {
console.warn('⚠️ Ошибка инициализации VK, но приложение продолжает работать:', e);
}
}

// Запускаем инициализацию когда страница загружена
if (document.readyState === 'complete') {
initVK();
} else {
window.addEventListener('load', initVK);
}

// На случай, если VK не загрузился — повторная попытка через 1 секунду
setTimeout(initVK, 1000);
</script>

<script>
// ============================================================
// 2. ТАБЛИЦА ЛИДЕРОВ
// ============================================================
function getLeaderboard() {
const data = localStorage.getItem('leaderboard');
return data ? JSON.parse(data) : [];
}

function saveLeaderboard(data) {
localStorage.setItem('leaderboard', JSON.stringify(data));
}

function addScore(name, points, attempts, time) {
const board = getLeaderboard();
board.push({ name, points, attempts, time, date: new Date().toLocaleDateString() });
board.sort((a, b) => b.points - a.points);
if (board.length > 10) board.length = 10;
saveLeaderboard(board);
}

function isTopScore(points) {
const board = getLeaderboard();
if (board.length < 10) return true;
return points > board[board.length - 1].points;
}

function renderLeaderboard() {
const board = getLeaderboard();
const list = document.getElementById('leaderboardList');
if (board.length === 0) {
list.innerHTML = '<p style="text-align:center; opacity:0.6;">Пока нет рекордов. Стань первым! 🏆</p>';
return;
}
list.innerHTML = board.map((item, index) => `
<div class="leaderboard-item">
<span>#${index + 1}</span>
<span>${item.name}</span>
<span>${item.points} 🏆</span>
</div>
`).join('');
}

function toggleLeaderboard() {
const board = document.getElementById('leaderboard');
board.classList.toggle('show');
document.getElementById('leaderboardBtn').textContent = board.classList.contains('show') ? '❌ Скрыть' : '🏆 Таблица лидеров';
if (board.classList.contains('show')) renderLeaderboard();
}

// ============================================================
// 3. ИГРА
// ============================================================
let secret = Math.floor(Math.random() * 100) + 1;
let attempts = 0;
let score = 0;
let bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
let timer = 0;
let timerInterval = null;
let isGameActive = false;
let level = 'easy';
let currentPoints = 0;
let achievements = { firstTry: false, master: false, pro: false };

const levels = {
easy: { max: 50, attempts: 10, label: 'От 1 до 50', bonus: 1 },
medium: { max: 100, attempts: 10, label: 'От 1 до 100', bonus: 2 },
hard: { max: 200, attempts: 8, label: 'От 1 до 200', bonus: 3 }
};

const $ = id => document.getElementById(id);
const input = $('guessInput');
const checkBtn = $('checkBtn');
const newBtn = $('newBtn');
const hintBtn = $('hintBtn');
const themeBtn = $('themeBtn');
const leaderboardBtn = $('leaderboardBtn');
const resultDisplay = $('resultDisplay');
const hintDisplay = $('hintDisplay');
const scoreDisplay = $('scoreDisplay');
const bestDisplay = $('bestDisplay');
const attemptsDisplay = $('attemptsDisplay');
const timerDisplay = $('timerDisplay');
const achievementDiv = $('achievement');
const diffBtns = document.querySelectorAll('.btn-difficulty');
const nameOverlay = $('nameOverlay');
const nameInput = $('nameInput');
const saveNameBtn = $('saveNameBtn');

function updateUI() {
scoreDisplay.textContent = score;
bestDisplay.textContent = bestScore;
attemptsDisplay.textContent = `${attempts}/${levels[level].attempts}`;
}

function showAchievement(text) {
achievementDiv.textContent = text;
achievementDiv.classList.add('show');
setTimeout(() => achievementDiv.classList.remove('show'), 2500);
}

function startTimer() {
if (timerInterval) return;
timer = 0;
timerDisplay.textContent = '0';
isGameActive = true;
timerInterval = setInterval(() => {
timer++;
timerDisplay.textContent = timer;
}, 1000);
}

function stopTimer() {
clearInterval(timerInterval);
timerInterval = null;
isGameActive = false;
}

function checkGuess() {
const raw = input.value.trim();
if (raw === '') {
resultDisplay.textContent = '⚠️ Введи число!';
resultDisplay.className = 'result red';
return;
}
const guess = parseInt(raw);
const maxNum = levels[level].max;
if (isNaN(guess) || guess < 1 || guess > maxNum) {
resultDisplay.textContent = `⚠️ Число от 1 до ${maxNum}!`;
resultDisplay.className = 'result red';
return;
}

if (!isGameActive) startTimer();
attempts++;
const remaining = levels[level].attempts - attempts;

if (guess < secret) {
resultDisplay.textContent = `❌ Мало! Осталось ${remaining} попыток`;
resultDisplay.className = 'result orange';
} else if (guess > secret) {
resultDisplay.textContent = `❌ Много! Осталось ${remaining} попыток`;
resultDisplay.className = 'result orange';
} else {
stopTimer();
const bonus = levels[level].bonus;
currentPoints = (levels[level].attempts - attempts + 1) * bonus + Math.max(0, 10 - timer);
currentPoints = Math.max(currentPoints, 1);
score += currentPoints;
if (score > bestScore) {
bestScore = score;
localStorage.setItem('bestScore', bestScore);
}
resultDisplay.textContent = `🎉 Угадал за ${attempts} попыток! +${currentPoints} очков 🕐${timer}с`;
resultDisplay.className = 'result green';
input.disabled = true;
checkBtn.disabled = true;
if (attempts === 1 && !achievements.firstTry) {
achievements.firstTry = true;
showAchievement('🎯 С первого раза! Ты гений!');
}
if (attempts <= 3 && !achievements.master) {
achievements.master = true;
showAchievement('🏆 Мастер! Отличная интуиция!');
}
if (attempts <= 5 && !achievements.pro) {
achievements.pro = true;
showAchievement('🌟 Профи! Ты на высоте!');
}
updateUI();
if (isTopScore(currentPoints)) {
const playerName = localStorage.getItem('playerName');
if (playerName) {
addScore(playerName, currentPoints, attempts, timer);
} else {
nameOverlay.classList.add('show');
nameInput.focus();
}
}
return;
}

if (attempts >= levels[level].attempts) {
stopTimer();
resultDisplay.textContent = `💔 Проиграл! Было ${secret}`;
resultDisplay.className = 'result red';
input.disabled = true;
checkBtn.disabled = true;
}
updateUI();
input.value = '';
input.focus();
}

function newGame() {
stopTimer();
const maxNum = levels[level].max;
secret = Math.floor(Math.random() * maxNum) + 1;
attempts = 0;
timer = 0;
timerDisplay.textContent = '0';
isGameActive = false;
input.disabled = false;
checkBtn.disabled = false;
input.value = '';
resultDisplay.textContent = `🔄 Новая игра! (1-${maxNum})`;
resultDisplay.className = 'result blue';
hintDisplay.textContent = '💡 Нажми "Подсказка"';
achievements = { firstTry: false, master: false, pro: false };
updateUI();
input.focus();
}

function showHint() {
const maxNum = levels[level].max;
const mid = Math.floor(maxNum / 2);
hintDisplay.textContent = secret < mid ? `💡 Число МЕНЬШЕ ${mid}` : `💡 Число БОЛЬШЕ ${mid}`;
}

function toggleTheme() {
document.body.classList.toggle('dark');
themeBtn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
const c = document.querySelector('.container');
if (c) c.style.background = document.body.classList.contains('dark') ? '#1e1e2e' : 'white';
}

function setLevel(lvl) {
level = lvl;
diffBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.level === lvl));
document.getElementById('subtitle').textContent = levels[lvl].label;
const maxNum = levels[lvl].max;
secret = Math.floor(Math.random() * maxNum) + 1;
attempts = 0;
timer = 0;
timerDisplay.textContent = '0';
isGameActive = false;
input.disabled = false;
checkBtn.disabled = false;
input.value = '';
resultDisplay.textContent = `🎮 Новый уровень! (1-${maxNum})`;
resultDisplay.className = 'result blue';
hintDisplay.textContent = '💡 Нажми "Подсказка"';
updateUI();
input.focus();
}

saveNameBtn.addEventListener('click', function() {
const name = nameInput.value.trim() || 'Игрок';
localStorage.setItem('playerName', name);
addScore(name, currentPoints, attempts, timer);
nameOverlay.classList.remove('show');
renderLeaderboard();
if (document.getElementById('leaderboard').classList.contains('show')) renderLeaderboard();
});

nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveNameBtn.click(); });

// Вешаем события
checkBtn.addEventListener('click', checkGuess);
newBtn.addEventListener('click', newGame);
hintBtn.addEventListener('click', showHint);
themeBtn.addEventListener('click', toggleTheme);
leaderboardBtn.addEventListener('click', toggleLeaderboard);
input.addEventListener('keydown', e => { if (e.key === 'Enter') checkGuess(); });
diffBtns.forEach(btn => btn.addEventListener('click', () => setLevel(btn.dataset.level)));

// Старт
updateUI();
input.focus();
const savedName = localStorage.getItem('playerName');
if (savedName) nameInput.value = savedName;
</script>
</body>
</html>
