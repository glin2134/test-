<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Угадай число</title>
    <link rel="stylesheet" href="https://unpkg.com/@vkontakte/vkui@4.18.0/dist/vkui.min.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--vkui--color_background, #fff);
            color: var(--vkui--color_text_primary, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-top: 0; text-align: center; }
        .status {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--vkui--color_text_secondary, #818c99);
        }
        .btn {
            width: 100%;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Угадай число</h2>
        <p style="text-align:center;">Инициализация VK Bridge...</p>
        <div id="status" class="status">Ожидание инициализации</div>
        <button id="startBtn" class="vkuiButton vkuiButton--size_l vkuiButton--mode_primary btn" onclick="startGame()" disabled>Начать игру</button>
    </div>

    <script>
        const bridge = window.VKBridge;
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');

        function initBridge() {
            if (!bridge) {
                statusEl.textContent = 'Ошибка: VK Bridge не найден. Проверьте консоль.';
                console.error('VK Bridge not found');
                return;
            }

            statusEl.textContent = 'Отправка VKWebAppInit...';
            bridge.send('VKWebAppInit')
                .then(data => {
                    statusEl.textContent = 'VK Bridge инициализирован. Готово к запуску.';
                    console.log('VK Bridge initialized:', data);
                    startBtn.disabled = false;
                })
                .catch(err => {
                    statusEl.textContent = 'Ошибка инициализации VK Bridge.';
                    console.error('VK Bridge init error:', err);
                });
        }

        function startGame() {
            // Здесь будет логика игры
            statusEl.textContent = 'Игра началась!';
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initBridge);
        } else {
            initBridge();
        }
    </script>
</body>
</html>
